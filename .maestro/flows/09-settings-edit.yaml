appId: com.crosspointsync.app
name: "Settings - Edit Upload Path"
tags:
  - requires-interaction
---
# Fresh launch to avoid leftover sheet state from prior flows
- stopApp
- launchApp

# Wait for app to load
- extendedWaitUntil:
    visible:
      id: "Library.ConnectionPill"
    timeout: 10000

# Navigate to Settings tab
- runFlow: ../helpers/navigate-to-settings.yaml

- tapOn:
    id: "Settings.UploadPath"

- waitForAnimationToEnd

- takeScreenshot: settings-upload-path-edit
